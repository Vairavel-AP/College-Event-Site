# ============================================================
# Nagios object definitions for the College Event Site project
# Copy this file into your Nagios /etc/nagios/objects/ directory
# and reference it from nagios.cfg with:
#   cfg_file=/etc/nagios/objects/college-event-site.cfg
# ============================================================

define host {
    use                     linux-server
    host_name               college-event-host
    alias                   College Event Site Host
    address                 127.0.0.1        ; change to your Docker/K8s host IP
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               college-event-host
    service_description     HTTP - Website Availability
    check_command           check_http!-p 30081 -u /healthz    ; use 30080 instead if you deployed the plain nginx static site
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               college-event-host
    service_description     PING
    check_command           check_ping!100.0,20%!500.0,60%
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
