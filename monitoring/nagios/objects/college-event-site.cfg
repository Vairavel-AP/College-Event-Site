# ============================================================
# Nagios object definitions for the College Event Site project
# Mounted directly into /opt/nagios/etc/objects/ by docker-compose.yml
# (that directory is already scanned via cfg_dir in the base image,
# so no changes to nagios.cfg are needed)
# ============================================================

define host {
    use                     linux-server
    host_name               techfest-backend-host
    alias                   TechFest Backend Host
    address                 host.docker.internal   ; resolves to your Windows host from inside the container
    max_check_attempts      5
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    use                     generic-service
    host_name               techfest-backend-host
    service_description     HTTP - Website Availability
    check_command           check_http!-p 8081 -u /healthz
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}

define service {
    host_name           techfest-backend-host
    service_description PING
    check_command        check_tcp!8081
    max_check_attempts      3
    check_interval          1
    retry_interval          1
    check_period            24x7
    notification_interval   30
    notification_period     24x7
}
