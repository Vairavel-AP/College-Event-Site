version: "3.8"

# Runs Nagios Core in a container using the popular jasonrivers/nagios image.
# Our custom host/service definitions are mounted in from ./nagios/objects.
#
# Web UI:  http://localhost:8081/nagios   (user: nagiosadmin / pass: nagios)

services:
  nagios:
    image: jasonrivers/nagios:latest
    container_name: nagios
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nagios/objects/college-event-site.cfg:/opt/nagios/etc/objects/college-event-site.cfg
    environment:
      - NAGIOSADMIN_USER=nagiosadmin
      - NAGIOSADMIN_PASS=nagios
    # Nagios needs to reach the host machine to check the website's NodePort.
    # On Linux, uncomment the line below and use the host IP in the .cfg file
    # instead of 127.0.0.1. On Docker Desktop (Mac/Windows) use host.docker.internal.
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
