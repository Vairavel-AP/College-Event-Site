apiVersion: apps/v1
kind: Deployment

metadata:
  name: college-event-site
  labels:
    app: college-event-site

spec:
  replicas: 2

  selector:
    matchLabels:
      app: college-event-site

  template:
    metadata:
      labels:
        app: college-event-site

    spec:
      containers:
        - name: college-event-site

          image: college-event-site:v1

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 80

          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
