apiVersion: apps/v1
kind: Deployment

metadata:
  name: techfest-backend
  labels:
    app: techfest-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: techfest-backend

  template:
    metadata:
      labels:
        app: techfest-backend

    spec:
      containers:
        - name: techfest-backend

          image: techfest-backend:v1

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8081
            - containerPort: 9090

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 5
