server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Main site
    location / {
        try_files $uri $uri/ =404;
    }

    # Simple health check endpoint used by Nagios / Kubernetes probes
    location = /healthz {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Nginx stub_status - used to feed request/connection metrics into Graphite
    location = /nginx_status {
        stub_status;
        allow 127.0.0.1;
        allow all;
        access_log off;
    }
}
