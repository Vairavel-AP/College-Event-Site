<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | TechFest 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="navbar">
    <a class="brand" href="index.html">TechFest 2026</a>
    <nav>
      <a href="index.html">Home</a>
      <a href="schedule.html">Schedule</a>
      <a href="speakers.html">Speakers</a>
      <a href="register.html">Register</a>
      <a href="announcements.html">Announcements</a>
    </nav>
  </div>

  <div class="container">
    <h2 class="section-title">Register for TechFest 2026</h2>

    <form class="reg-form" id="regForm">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" placeholder="Enter your full name" required>

      <label for="college">College / Organization</label>
      <input type="text" id="college" placeholder="Enter your college name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required>

      <label for="event">Event Track</label>
      <select id="event" required>
        <option value="">-- Select a track --</option>
        <option value="hackathon">Hackathon</option>
        <option value="paper">Paper Presentation</option>
        <option value="workshop">Workshop Only</option>
        <option value="general">General Attendee</option>
      </select>

      <label for="notes">Notes (optional)</label>
      <textarea id="notes" rows="3" placeholder="Team name, dietary requirements, etc."></textarea>

      <button type="submit">Submit Registration</button>
      <div id="regSuccess">✅ Registration submitted! A confirmation email will be sent shortly.</div>
    </form>
  </div>

  <footer>
    &copy; 2026 College of Engineering — Department of Computer Science | TechFest Organizing Committee
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
